<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>waBaileys — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-deep: #06080d;
  --bg-base: #0c1017;
  --bg-card: #12161f;
  --bg-elevated: #1a1f2b;
  --bg-input: #0e1219;
  --border: #1e2536;
  --border-hover: #2a3348;
  --text-primary: #e8ecf4;
  --text-secondary: #8b95a8;
  --text-muted: #4e5869;
  --accent: #10b981;
  --accent-dim: rgba(16,185,129,0.12);
  --accent-glow: rgba(16,185,129,0.25);
  --danger: #f43f5e;
  --danger-dim: rgba(244,63,94,0.12);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.3), 0 4px 20px rgba(0,0,0,0.15);
  --shadow-elevated: 0 4px 12px rgba(0,0,0,0.4), 0 12px 40px rgba(0,0,0,0.25);
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed;
  top: -30%; left: -10%;
  width: 50%; height: 60%;
  background: radial-gradient(ellipse, rgba(16,185,129,0.04) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -20%; right: -10%;
  width: 45%; height: 50%;
  background: radial-gradient(ellipse, rgba(59,130,246,0.03) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
.login-wrap {
  position: relative; z-index: 1;
  width: 100%; max-width: 420px;
  padding: 24px;
}
.logo {
  display: flex; align-items: center; justify-content: center;
  gap: 12px; margin-bottom: 32px;
}
.logo-mark {
  width: 42px; height: 42px; border-radius: 12px;
  background: linear-gradient(135deg, #10b981, #059669);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 24px rgba(16,185,129,0.2);
}
.logo-mark svg { width: 22px; height: 22px; }
.logo-text { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.02em; }
.logo-text span { color: var(--text-muted); font-weight: 400; }

.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-elevated);
  padding: 32px;
}
.card h2 {
  font-size: 1.1rem; font-weight: 700;
  margin-bottom: 6px; letter-spacing: -0.01em;
}
.card p {
  font-size: 0.84rem; color: var(--text-secondary);
  margin-bottom: 24px; line-height: 1.5;
}
.form-group { margin-bottom: 20px; }
.form-group:last-of-type { margin-bottom: 24px; }
.form-label {
  display: block; font-size: 0.78rem; font-weight: 500;
  color: var(--text-secondary); margin-bottom: 7px; letter-spacing: 0.01em;
}
.form-input {
  width: 100%; padding: 12px 14px;
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-primary);
  font-size: 0.9rem; font-family: inherit;
  transition: var(--transition); outline: none;
}
.form-input:focus {
  border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim);
}
.form-input::placeholder { color: var(--text-muted); }

.btn {
  width: 100%; padding: 12px 20px; border-radius: var(--radius-sm);
  font-size: 0.9rem; font-weight: 600; font-family: inherit;
  border: none; cursor: pointer; transition: var(--transition);
  outline: none; display: flex; align-items: center;
  justify-content: center; gap: 8px;
}
.btn svg { width: 18px; height: 18px; flex-shrink: 0; }
.btn-primary { background: var(--accent); color: #022c22; }
.btn-primary:hover {
  background: #0ea272;
  box-shadow: 0 0 24px rgba(16,185,129,0.25);
  transform: translateY(-1px);
}
.btn-primary:active { transform: translateY(0); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

.error-box {
  display: none; padding: 12px 14px;
  background: var(--danger-dim); border: 1px solid rgba(244,63,94,0.2);
  border-radius: var(--radius-sm); color: #fda4af;
  font-size: 0.82rem; margin-bottom: 16px; line-height: 1.4;
  align-items: flex-start; gap: 8px;
}
.error-box.visible { display: flex; }
.error-box svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }

.footer { text-align: center; margin-top: 20px; font-size: 0.72rem; color: var(--text-muted); }

@media (max-width: 480px) { .login-wrap { padding: 16px; } .card { padding: 24px; } }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
      </svg>
    </div>
    <div class="logo-text">waBaileys<span>Dashboard</span></div>
  </div>

  <div class="card">
    <h2>Masuk</h2>
    <p>Gunakan username dan password untuk mengakses dashboard</p>

    <div class="error-box" id="errorBox">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="errorText"></span>
    </div>

    <div class="form-group">
      <label class="form-label" for="username">Username</label>
      <input class="form-input" id="username" type="text" placeholder="admin" autocomplete="username" autofocus>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" id="password" type="password" placeholder="Masukkan password" autocomplete="current-password">
    </div>

    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Masuk
    </button>
  </div>

  <div class="footer">waBaileys &mdash; WhatsApp Alert Bot</div>
</div>

<script>
function showError(msg) {
  document.getElementById('errorText').textContent = msg;
  document.getElementById('errorBox').classList.add('visible');
}

async function doLogin() {
  var username = document.getElementById('username').value.trim();
  var password = document.getElementById('password').value;

  if (!username) { showError('Username wajib diisi'); return; }
  if (!password) { showError('Password wajib diisi'); return; }

  var btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border:2px solid rgba(2,44,34,0.3);border-top-color:#022c22;border-radius:50%;animation: spin 0.7s linear infinite;margin:0"></div> Memverifikasi...';

  try {
    var r = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, password: password })
    });
    var data = await r.json();

    if (r.ok && data.token) {
      localStorage.setItem('wabaileys_token', data.token);
      if (data.user) {
        localStorage.setItem('wabaileys_user', JSON.stringify(data.user));
      }
      window.location.href = '/dashboard';
    } else {
      showError(data.error || 'Login gagal. Periksa username dan password.');
    }
  } catch(e) {
    showError('Gagal terhubung ke server: ' + e.message);
  }

  btn.disabled = false;
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>\n      Masuk';
}

// Enter key: pindah ke field berikutnya atau submit
document.getElementById('username').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('password').focus();
});
document.getElementById('password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
</script>
<style>@keyframes spin { to { transform: rotate(360deg); } }</style>
</body>
</html>
